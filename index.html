<html lang="id">
<head>

<meta name="mobile-web-app-capable" content="yes">

<script>
if(!window.supabase){document.write('<scr'+'ipt src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"><\/scr'+'ipt>');}
if(!window.XLSX){document.write('<scr'+'ipt src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"><\/scr'+'ipt>');}

<style>
  :root{
    --teal:#145a52; --teal-d:#0e423c; --coral:#e8743b;
    --bg:#f4f3ef; --surface:#ffffff; --line:#e3e1da;
    --ink:#1f2421; --muted:#6b6f6a; --ok:#1d7a4d; --warn:#b4540e; --danger:#b3261e;
    --radius:10px;
  }
  *{box-sizing:border-box}
  html,body{overflow-x:hidden}
  input,select,textarea{max-width:100%}
  body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
       background:var(--bg);color:var(--ink);font-size:15px;line-height:1.5}
  h1,h2,h3{margin:0;font-weight:600}
  button{font:inherit;cursor:pointer}
  input,select,textarea{font:inherit;width:100%;padding:9px 11px;border:1px solid var(--line);
       border-radius:8px;background:#fff;color:var(--ink)}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--teal);outline-offset:1px;border-color:var(--teal)}
  .btn{padding:9px 15px;border:1px solid var(--teal);background:var(--teal);color:#fff;border-radius:8px;font-weight:500}
  .btn:hover{background:var(--teal-d)}
  .btn.sec{background:#fff;color:var(--teal)}
  .btn.sec:hover{background:#eef4f2}
  .btn.ghost{background:transparent;border-color:var(--line);color:var(--ink)}
  .btn.sm{padding:5px 10px;font-size:13px}
  .btn.danger{background:#fff;border-color:var(--danger);color:var(--danger)}
  .btn.danger:hover{background:#fcecea}

  /* Auth screens */
  .auth{min-height:100vh;display:grid;place-items:center;padding:20px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:26px;width:100%;max-width:380px}
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .logo{width:38px;height:38px;border-radius:9px;background:var(--teal);color:#fff;display:grid;place-items:center;font-weight:700}
  .sub{color:var(--muted);font-size:13px;margin:2px 0 18px}
  .field{margin-bottom:13px}
  .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:5px}
  .msg{font-size:13px;margin-top:10px;min-height:18px}
  .msg.err{color:var(--danger)} .msg.ok{color:var(--ok)}

  /* App shell */
  #app{display:none;min-height:100vh}
  .shell{display:grid;grid-template-columns:230px 1fr;min-height:100vh;align-items:start}
  .side{background:var(--teal);color:#dff0ec;display:flex;flex-direction:column;padding:14px 10px;padding-top:calc(14px + env(safe-area-inset-top));padding-left:calc(10px + env(safe-area-inset-left));position:sticky;top:0;height:100vh;overflow-y:auto;border-right:1px solid rgba(0,0,0,.08)}
  .side .brand{color:#fff;margin:6px 8px 16px}
  .side .logo{background:#fff;color:var(--teal)}
  .nav{display:flex;flex-direction:column;gap:2px}
  .nav a{color:#cfe6e0;text-decoration:none;padding:9px 12px;border-radius:8px;font-size:14px;display:flex;justify-content:space-between;align-items:center}
  .nav a:hover{background:rgba(255,255,255,.08);color:#fff}
  .nav a.active{background:#fff;color:var(--teal);font-weight:600}
  .nav .soon{font-size:11px;opacity:.7}
  .nav .grp{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:#9fc7bf;padding:12px 12px 4px}
  .side .who{margin-top:auto;border-top:1px solid rgba(255,255,255,.15);padding:12px 10px 4px;font-size:13px}
  .side .who b{color:#fff} .side .role{color:#bfe0d8;font-size:12px;text-transform:capitalize}
  .main{display:flex;flex-direction:column;min-width:0}
  .topbar{background:var(--surface);border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:10px;padding:13px 22px;padding-top:calc(13px + env(safe-area-inset-top));padding-left:calc(22px + env(safe-area-inset-left));padding-right:calc(22px + env(safe-area-inset-right));position:sticky;top:0;z-index:30}
  .content{padding:22px;padding-left:calc(22px + env(safe-area-inset-left));padding-right:calc(22px + env(safe-area-inset-right));padding-bottom:calc(22px + env(safe-area-inset-bottom))}
  .pagehead{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:12px;flex-wrap:wrap}

  .panel{background:var(--surface);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--line)}
  th{background:#faf9f6;font-weight:600;color:var(--muted);font-size:12.5px;text-transform:uppercase;letter-spacing:.02em}
  tr:last-child td{border-bottom:none}
  td.num,th.num{text-align:right}
  .pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:12px;background:#eef4f2;color:var(--teal)}
  .lrow{display:flex;gap:10px;align-items:center;padding:9px 12px;border-bottom:1px solid var(--line);background:var(--surface)}
  .lrow:last-child{border-bottom:none}
  .ldot{width:9px;height:9px;border-radius:50%;flex:0 0 auto}
  .lmain{flex:1;min-width:0}
  .lname{font-size:13.5px;font-weight:600;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
  .lmeta{font-size:12px;color:var(--muted);margin-top:2px;word-break:break-word}
  .lright{text-align:right;flex:0 0 auto;max-width:48%}
  .lprice{font-size:13px;font-weight:600}
  .lbtns{display:flex;gap:5px;justify-content:flex-end;flex-wrap:wrap;margin-top:4px}
  .pill.warn{background:#fcefe2;color:var(--warn)} .pill.bad{background:#fcecea;color:var(--danger)}
  .empty{padding:40px;text-align:center;color:var(--muted)}

  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:18px}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:16px}
  .stat .lbl{font-size:13px;color:var(--muted)} .stat .val{font-size:26px;font-weight:600;margin-top:2px}

  .modal-bg{position:fixed;inset:0;background:rgba(20,30,28,.45);display:none;place-items:center;padding:20px;z-index:50}
  .modal{background:#fff;border-radius:14px;max-width:560px;width:100%;max-height:88vh;overflow:auto;padding:22px;position:relative}
  .modal-x{position:absolute;top:8px;right:10px;border:none;background:transparent;font-size:20px;line-height:1;color:#9aa3a0;cursor:pointer;padding:6px;border-radius:8px}
  .modal-x:hover{background:#f0f0ee;color:var(--ink)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .modal-foot{display:flex;justify-content:flex-end;gap:10px;margin-top:18px}
  .soon-box{padding:50px 24px;text-align:center;color:var(--muted);background:var(--surface);border:1px dashed var(--line);border-radius:12px}
  .soon-box .big{font-size:18px;color:var(--ink);font-weight:600;margin-bottom:6px}

  .menu-btn{display:none;background:transparent;border:1px solid var(--line);border-radius:8px;padding:0 12px;min-height:44px;min-width:44px;font-size:22px;line-height:1;cursor:pointer;color:var(--ink);justify-content:center}
  .side-backdrop{position:fixed;inset:0;background:rgba(20,30,28,.45);z-index:39;display:none}
  .pos-wrap{display:flex;flex-direction:column}
  .pos-layout{display:grid;grid-template-columns:minmax(0,1fr) minmax(280px,340px);gap:16px;align-items:start}
  .pos-left{min-width:0}
  .pos-right{min-width:0;position:sticky;top:72px;align-self:start}
  @media(max-width:1024px){
    html,body{overflow-x:hidden}
    .shell{grid-template-columns:1fr}
    .side{position:fixed;left:0;top:0;bottom:0;width:240px;transform:translateX(-100%);transition:transform .22s;z-index:40}
    .side.open{transform:none}
    .side.open ~ .side-backdrop{display:block}
    .menu-btn{display:inline-flex;align-items:center}
    .grid2{grid-template-columns:1fr}
    .content{padding:14px;padding-left:calc(14px + env(safe-area-inset-left));padding-right:calc(14px + env(safe-area-inset-right));padding-bottom:calc(14px + env(safe-area-inset-bottom))}
    .pos-layout{grid-template-columns:1fr}
    .pos-right{position:static}
    .panel{overflow-x:visible}
    td{word-break:break-word}
    /* Tabel menjadi kartu bertumpuk: tanpa scroll samping */
    table.rsp,table.rsp tbody,table.rsp tr{display:block;width:100%}
    table.rsp thead{display:none}
    table.rsp tr{padding:9px 12px;border-bottom:6px solid var(--bg)}
    table.rsp tr:last-child{border-bottom:none}
    table.rsp td{display:flex;justify-content:space-between;align-items:center;gap:12px;border:none;padding:3px 0;white-space:normal;text-align:right}
    table.rsp td::before{content:attr(data-l);color:var(--muted);font-size:12px;flex:0 0 auto;text-align:left}
    table.rsp td:first-child{font-weight:600}
    table.rsp td[data-l=""]{justify-content:flex-end;flex-wrap:wrap;gap:6px}
    table.rsp td[data-l=""]::before{content:none}
    table.rsp td[data-empty="1"]{display:none}
    .cards{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
  }
  #rotate-lock{display:none;position:fixed;inset:0;z-index:99999;background:var(--teal);color:#fff;flex-direction:column;align-items:center;justify-content:center;gap:12px;text-align:center;padding:28px}
</style>
</head>
<body>

<div id="rotate-lock"><div style="font-size:44px">📱</div><b style="font-size:17px">Putar perangkat ke posisi tegak</b><span style="font-size:13px;opacity:.85">Aplikasi ini dirancang untuk mode portrait.</span></div>

<!-- CONFIG -->
<div id="screen-config" class="auth" style="display:none">
  <div class="card">
    <div class="brand"><div class="logo">71</div><div><h1 style="font-size:17px">71 Kitchen</h1></div></div>
    <p class="sub">Sambungkan ke Supabase. Tempel URL & anon key project kamu.</p>
    <div class="field"><label>Supabase URL</label><input id="cfg-url" placeholder="https://xxxx.supabase.co"></div>
    <div class="field"><label>Anon key (public)</label><input id="cfg-key" placeholder="eyJhbGciOi..."></div>
    <button class="btn" style="width:100%" onclick="saveConfig()">Simpan & sambungkan</button>
    <div id="cfg-msg" class="msg"></div>
  </div>
</div>

<!-- LOGIN -->
<div id="screen-login" class="auth" style="display:none">
  <div class="card">
    <div class="brand"><div class="logo">71</div><div><h1 style="font-size:17px">71 Kitchen & Seafood</h1></div></div>
    <p class="sub">Masuk ke sistem operasional</p>
    <div class="field"><label>Username</label><input id="lg-user" autocomplete="username"></div>
    <div class="field"><label>Password</label><input id="lg-pass" type="password" autocomplete="current-password"></div>
    <button class="btn" style="width:100%" onclick="doLogin()">Masuk</button>
    <div id="lg-msg" class="msg"></div>
    <button class="btn ghost sm" style="width:100%;margin-top:14px" onclick="resetConfig()">Ganti koneksi Supabase</button>
    <div style="text-align:center;font-size:11px;color:var(--muted);margin-top:10px">Versi <span class="appver"></span></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="shell">
    <aside class="side" id="side">
      <div class="brand"><div class="logo">71</div><div><b id="brand-name">71 Kitchen</b></div></div>
      <nav class="nav" id="nav"></nav>
      <div class="who"><b id="who-name"></b><div class="role" id="who-role"></div></div>
    </aside>
    <div class="side-backdrop" id="side-backdrop" onclick="document.getElementById('side').classList.remove('open')"></div>
    <div class="main">
      <div class="topbar">
        <button class="menu-btn" onclick="document.getElementById('side').classList.toggle('open')">☰</button>
        <strong id="page-title">Dashboard</strong>
        <button class="btn ghost sm" onclick="doLogout()">Keluar</button>
      </div>
      <div class="content" id="content"></div>
    </div>
  </div>
</div>

<div class="modal-bg" id="modal-bg"><div class="modal" id="modal"></div></div>

<script>
const LS_URL='kit_sb_url', LS_KEY='kit_sb_key';
const DEFAULT_URL='https://ehorzoooqinfcmgyitju.supabase.co';
const DEFAULT_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVob3J6b29vcWluZmNtZ3lpdGp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2Mjk0MjUsImV4cCI6MjA5ODIwNTQyNX0.Y8ME7LPHgoTayA1CwnC9Q3oXHHNE9G_s_lVHdNkxFPI';
let sb=null, ME={username:'',role:'',id:''}, SETTINGS={}, POLL=null, SHIFT=null;
const APP_VER='2026-07-06.12';
document.addEventListener('DOMContentLoaded',()=>{document.querySelectorAll('.appver').forEach(e=>e.textContent=APP_VER);});
/* Tabel responsif otomatis: tiap tabel diberi label kolom agar jadi kartu di layar kecil */
function rspTables(){
  document.querySelectorAll('table').forEach(t=>{
    t.classList.add('rsp');
    const ths=[...t.querySelectorAll('thead th')].map(x=>x.textContent.trim());
    t.querySelectorAll('tbody tr').forEach(tr=>[...tr.children].forEach((td,i)=>{ if(!td.hasAttribute('data-l')) td.setAttribute('data-l',ths[i]||''); if(td.textContent.trim()==='\u2014') td.setAttribute('data-empty','1'); }));
  });
}
document.addEventListener('DOMContentLoaded',()=>{ rspTables(); new MutationObserver(rspTables).observe(document.body,{childList:true,subtree:true}); });

/* ---------- Boot ---------- */
function show(id){['screen-config','screen-login','app'].forEach(s=>document.getElementById(s).style.display='none');
  document.getElementById(id).style.display = id==='app'?'block':'grid';}

async function boot(){
  const url=localStorage.getItem(LS_URL)||DEFAULT_URL, key=localStorage.getItem(LS_KEY)||DEFAULT_KEY;
  if(!url||!key){ show('screen-config'); return; }
  sb=window.supabase.createClient(url,key);
  const {data:{session}}=await sb.auth.getSession();
  if(session){ await afterLogin(); } else { show('screen-login'); }
}
function saveConfig(){
  const url=document.getElementById('cfg-url').value.trim(), key=document.getElementById('cfg-key').value.trim();
  if(!url||!key){ msg('cfg-msg','URL dan anon key wajib diisi.','err'); return; }
  localStorage.setItem(LS_URL,url); localStorage.setItem(LS_KEY,key); boot();
}
function resetConfig(){ localStorage.removeItem(LS_URL); localStorage.removeItem(LS_KEY); boot(); }
function msg(id,t,cls){ const e=document.getElementById(id); e.textContent=t; e.className='msg '+(cls||''); }

/* ---------- Auth ---------- */
async function doLogin(){
  const u=document.getElementById('lg-user').value.trim().toLowerCase();
  const p=document.getElementById('lg-pass').value;
  if(!u||!p){ msg('lg-msg','Username dan password wajib diisi.','err'); return; }
  msg('lg-msg','Memproses...','');
  const {error}=await sb.auth.signInWithPassword({email:u+'@71.id',password:p});
  if(error){ msg('lg-msg','Login gagal: username atau password salah.','err'); return; }
  await afterLogin();
}
async function afterLogin(){
  const {data:{user}}=await sb.auth.getUser();
  const {data,error}=await sb.from('app_users').select('username,full_name,role').eq('id',user.id).single();
  if(error||!data){ msg('lg-msg','Akun belum terdaftar di app_users. Hubungi Owner.','err'); await sb.auth.signOut(); show('screen-login'); return; }
  ME={username:data.username,role:data.role,id:user.id,name:data.full_name||data.username};
  await loadSettings();
  document.getElementById('who-name').textContent=ME.name;
  document.getElementById('who-role').textContent=ME.role;
  document.getElementById('brand-name').textContent=(SETTINGS.outlet&&SETTINGS.outlet.name)||'71 Kitchen';
  await loadShift();
  buildNav(); show('app'); go('dashboard');
}
async function doLogout(){ await sb.auth.signOut(); show('screen-login'); }
async function loadSettings(){
  const {data}=await sb.from('settings').select('key,value');
  SETTINGS={}; (data||[]).forEach(r=>SETTINGS[r.key]=r.value);
  refreshProductFields();
}
function refreshProductFields(){
  const f=[
    {k:'code',l:'Kode'},{k:'name',l:'Nama',req:true},
    {k:'category',l:'Kategori',type:'cat'},
    {k:'type',l:'Jenis',type:'select',opts:['Jadi','Resep','Bundling']},
    {k:'kitchen',l:'Dapur',type:'select',opts:['','Makanan','Bakaran','Minuman']},
    {k:'price_dinein',l:'Harga',type:'num'}
  ];
  CHANNELS.forEach(c=>{ if(c.base||c.sameAsBase)return; f.push({k:c.field,l:'Harga '+c.label,type:'num',hint:'kosongkan = ikut Harga dasar'}); });
  f.push({k:'stock',l:'Stok (utk Jadi)',type:'num'},{k:'min_stock',l:'Stok Min',type:'num'},{k:'available',l:'Tersedia',type:'bool'});
  if(typeof CFG!=='undefined'&&CFG.product) CFG.product.fields=f;
}

/* ---------- Navigation ---------- */
const MENU=[
  {grp:'Operasi'},
  {id:'dashboard',label:'Dashboard',roles:['owner','manager','admin','kasir','dapur']},
  {id:'pos',label:'Kasir / POS',roles:['owner','manager','kasir']},
  {id:'kitchen',label:'Dapur',roles:['owner','manager','dapur']},
  {id:'booking',label:'Booking',roles:['owner','manager','kasir']},
  {id:'shift',label:'Shift Kasir',roles:['owner','manager','kasir']},
  {grp:'Master Data'},
  {id:'product',label:'Produk',roles:['owner','manager']},
  {id:'raw',label:'Bahan Baku',roles:['owner','manager','admin']},
  {id:'seasoning',label:'Bumbu',roles:['owner','manager','admin']},
  {id:'import',label:'Impor Excel',roles:['owner','manager','admin']},
  {id:'member',label:'Member',roles:['owner','manager']},
  {id:'supplier',label:'Supplier',roles:['owner','manager','admin']},
  {id:'promo',label:'Promo',roles:['owner','manager']},
  {id:'tier',label:'Tier Membership',roles:['owner','manager']},
  {grp:'Keuangan'},
  {id:'purchase',label:'Pembelian',roles:['owner','manager','admin']},
  {id:'expense',label:'Pengeluaran',roles:['owner','manager','admin']},
  {id:'income',label:'Pendapatan Lain',roles:['owner','manager','admin']},
  {id:'opname',label:'Stok Opname',roles:['owner','manager','admin']},
  {id:'cash',label:'Kas',roles:['owner','manager']},
  {id:'report',label:'Laporan',roles:['owner','manager']},
  {grp:'Sistem'},
  {id:'settings',label:'Pengaturan',roles:['owner','manager']},
  {id:'printer',label:'Printer',roles:['owner','manager','kasir']},
  {id:'backup',label:'Backup',roles:['owner','manager']},
];
function buildNav(){
  const nav=document.getElementById('nav'); nav.innerHTML='';
  MENU.forEach(m=>{
    if(m.grp){ const g=document.createElement('div'); g.className='grp'; g.textContent=m.grp; nav.appendChild(g); return; }
    if(!m.roles.includes(ME.role)) return;
    const a=document.createElement('a'); a.href='#'; a.dataset.id=m.id;
    a.innerHTML=`<span>${m.label}</span>${m.soon?'<span class="soon">segera</span>':''}`;
    a.onclick=e=>{e.preventDefault(); go(m.id); document.getElementById('side').classList.remove('open');};
    nav.appendChild(a);
  });
}
function go(id){
  if(POLL){clearInterval(POLL);POLL=null;}
  document.querySelectorAll('.nav a').forEach(a=>a.classList.toggle('active',a.dataset.id===id));
  const item=MENU.find(m=>m.id===id)||{label:id};
  document.getElementById('page-title').textContent=item.label;
  const c=document.getElementById('content');
  if(item.soon){ c.innerHTML=`<div class="soon-box"><div class="big">${item.label}</div>Modul ini dibangun di iterasi berikutnya (Tahap 1 stage 2-3 & Tahap 2).</div>`; return; }
  ({dashboard:viewDashboard,pos:viewPOS,product:()=>crud(CFG.product),raw:()=>crud(CFG.raw),
    seasoning:()=>crud(CFG.seasoning),member:()=>crud(CFG.member),supplier:()=>crud(CFG.supplier),promo:()=>crud(CFG.promo),tier:()=>crud(CFG.tier),import:viewImport,settings:viewSettings,printer:viewPrinter,
    purchase:viewPurchase,expense:viewExpense,income:viewIncome,opname:viewOpname,cash:viewCash,kitchen:viewKitchen,booking:viewBooking,report:viewReport,backup:viewBackup,shift:viewShift}[id]||(()=>c.innerHTML=''))();
}

/* ---------- Helpers ---------- */
const rp=n=>'Rp '+Math.round(Number(n||0)).toLocaleString('id-ID');
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
function openModal(html){document.getElementById('modal').innerHTML='<button class="modal-x" type="button" onclick="closeModal()" aria-label="Tutup">✕</button>'+html;document.getElementById('modal-bg').style.display='grid';}
function closeModal(){document.getElementById('modal-bg').style.display='none';}
(function(){var mb=document.getElementById('modal-bg');var down=false;
  mb.addEventListener('pointerdown',function(e){down=(e.target===mb);});
  mb.addEventListener('click',function(e){if(e.target===mb&&down)closeModal();down=false;});})();

/* ---------- Master data CRUD (generic) ---------- */

let CRUD={q:'',cat:'all',kel:'all',st:'active',data:[],cfg:null};
async function crud(cfg){
  const c=document.getElementById('content');
  CRUD={q:'',cat:'all',kel:'all',st:cfg.archive?'active':'all',data:[],cfg};
  const hasCat=cfg.fields.some(f=>f.k==='category');
  const hasKel=cfg.fields.some(f=>f.k==='kelompok');
  const legend=[]; (cfg.cols||[]).forEach(co=>{ if(co.badge){ legend.push(Object.entries(co.badge).map(([k,v])=>v+'='+k).join(' \u00b7 ')); } if(co.dot){ legend.push('\u25cf hijau = tersedia'); } });
  c.innerHTML=`<div class="pagehead"><h2>${cfg.title}</h2>
    <button class="btn" onclick="editRow(CFG.${keyOf(cfg)},null)">+ Tambah</button></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:${legend.length?'6px':'12px'}">
      <input id="cr_q" placeholder="Cari nama / kode..." style="flex:1;min-width:140px" oninput="CRUD.q=this.value;renderCrud()">
      ${hasKel?`<select style="width:auto" onchange="CRUD.kel=this.value;renderCrud()"><option value="all">Semua kelompok</option><option>Makanan</option><option>Minuman</option><option>Umum</option></select>`:''}
      ${hasCat?`<select id="cr_cat" style="width:auto" onchange="CRUD.cat=this.value;renderCrud()"><option value="all">Semua kategori</option></select>`:''}
      ${cfg.archive?`<select style="width:auto" onchange="CRUD.st=this.value;renderCrud()"><option value="active">Aktif</option><option value="inactive">Nonaktif</option><option value="all">Semua</option></select>`:''}
    </div>
    ${legend.length?`<div style="font-size:11px;color:var(--muted);margin-bottom:10px">${legend.join(' \u00b7 ')}</div>`:''}
    <div class="panel" id="tbl"><div class="empty">Memuat...</div></div>`;
  const {data,error}=await sb.from(cfg.table).select(cfg.select||'*').order('name');
  const tbl=document.getElementById('tbl');
  if(error){ tbl.innerHTML=`<div class="empty">Gagal memuat: ${esc(error.message)}</div>`; return; }
  CRUD.data=data||[];
  if(hasCat){ const sel=document.getElementById('cr_cat'); if(sel){ const cats=[...new Set(CRUD.data.map(r=>r.category).filter(Boolean))].sort(); sel.innerHTML='<option value="all">Semua kategori</option>'+cats.map(x=>`<option value="${esc(x)}">${esc(x)}</option>`).join(''); } }
  renderCrud();
}
const fmtn=v=>{const n=Number(v);return isNaN(n)?esc(v):n.toLocaleString('id-ID');};
function renderCrud(){
  const cfg=CRUD.cfg, tbl=document.getElementById('tbl'); if(!cfg||!tbl)return;
  const q=CRUD.q.trim().toLowerCase();
  const data=CRUD.data.filter(r=>{
    if(q && !(String(r.name||'').toLowerCase().includes(q)||String(r.code||'').toLowerCase().includes(q)))return false;
    if(CRUD.cat!=='all' && r.category!==CRUD.cat)return false;
    if(CRUD.kel!=='all' && r.kelompok!==CRUD.kel)return false;
    if(cfg.archive){ if(CRUD.st==='active'&&r.active===false)return false; if(CRUD.st==='inactive'&&r.active!==false)return false; }
    return true;
  });
  if(!CRUD.data.length){ tbl.innerHTML=`<div class="empty">Belum ada data. Tambah manual atau lewat Impor Excel.</div>`; return; }
  if(!data.length){ tbl.innerHTML=`<div class="empty">Tidak ada data yang cocok dengan pencarian/filter.</div>`; return; }
  const titleCol=cfg.cols[0], moneyCol=cfg.cols.find(co=>co.money);
  tbl.innerHTML=data.map(r=>{
    const archived = cfg.archive && r.active===false;
    const dotOn = titleCol.dot ? (r[titleCol.dot]!==false && !archived) : null;
    const badges=cfg.cols.filter(co=>co.badge&&r[co.k]!=null&&co.badge[r[co.k]]).map(co=>`<span class="pill" style="font-size:10px" title="${esc(r[co.k])}">${esc(co.badge[r[co.k]])}</span>`).join(' ');
    const meta=cfg.cols.slice(1).map(co=>{
      if(co.badge||co.money)return '';
      let v=r[co.k];
      if(co.dot)return '';
      if(co.avail){ return v===false?'<span class="pill bad" style="font-size:10px">Tidak tersedia</span>':''; }
      if(co.bool){ return v===false?'<span class="pill" style="font-size:10px;background:#eee;color:#888">Nonaktif</span>':''; }
      if(co.prodcount){ return Array.isArray(v)&&v.length?v.length+' produk':(r.product?esc(r.product.name):''); }
      if(co.fk){ v=(v&&v[co.fkLabel||'name'])||''; return v?esc(v):''; }
      if(v==null||v==='')return '';
      if(co.num)return esc(co.l)+' '+fmtn(v);
      return esc(v);
    }).filter(Boolean).join(' \u00b7 ');
    return `<div class="lrow"${archived?' style="opacity:.55"':''}>
      ${dotOn!=null?`<span class="ldot" title="${dotOn?'Tersedia':'Tidak aktif / tidak tersedia'}" style="background:${dotOn?'#1d9e75':'#c9c7bf'}"></span>`:''}
      <div class="lmain"><div class="lname">${esc(r[titleCol.k]==null?'':r[titleCol.k])}${badges?' '+badges:''}${archived?' <span class="pill bad" style="font-size:10px">Arsip</span>':''}</div>
      ${meta?`<div class="lmeta">${meta}</div>`:''}</div>
      <div class="lright">${moneyCol&&r[moneyCol.k]!=null?`<div class="lprice">${rp(r[moneyCol.k])}</div>`:''}
        <div class="lbtns">${cfg.rowAction&&!archived&&(!cfg.rowAction.show||cfg.rowAction.show(r))?`<button class="btn sec sm" onclick='${cfg.rowAction.fn}(${JSON.stringify(r.id)})'>${cfg.rowAction.label}</button>`:''}<button class="btn sec sm" onclick='editRow(CFG.${keyOf(cfg)},${JSON.stringify(r.id)})'>Edit</button>${archived?`<button class="btn sec sm" onclick='restoreRow("${cfg.table}",${JSON.stringify(r.id)})'>Pulihkan</button>`:`<button class="btn danger sm" onclick='delRow("${cfg.table}",${JSON.stringify(r.id)},"${esc(r.name)}")'>Hapus</button>`}</div>
      </div></div>`;
  }).join('');
}
function keyOf(cfg){ return Object.keys(CFG).find(k=>CFG[k]===cfg); }
async function editRow(cfg,id){
  let row={};
  if(id){ const {data}=await sb.from(cfg.table).select('*').eq('id',id).single(); row=data||{}; }
  const fkOpts={};
  for(const fl of cfg.fields.filter(f=>f.type==='fk')){
    const lab=fl.fkLabel||'name';
    const {data}=await sb.from(fl.fkTable).select('id,'+lab).order(lab);
    fkOpts[fl.k]=data||[];
  }
  let catOpts=[];
  const catF=cfg.fields.find(f=>f.type==='cat');
  if(catF){ const {data}=await sb.from(cfg.table).select(catF.k); catOpts=[...new Set((data||[]).map(r=>r[catF.k]).filter(Boolean))].sort(); }
  let prodOpts=[];
  if(cfg.fields.some(f=>f.type==='multiprod')){ const {data}=await sb.from('products').select('id,name').eq('active',true).order('name'); prodOpts=data||[]; }
  const f=cfg.fields.map(fl=>{
    const v=row[fl.k];
    if(fl.type==='multiprod'){ const sel=Array.isArray(v)?v:[]; return field(fl.l,`<div id="f_${fl.k}" style="max-height:180px;overflow:auto;border:1px solid var(--line);border-radius:8px;padding:8px">${prodOpts.length?prodOpts.map(o=>`<label style="display:block;padding:3px 0;font-weight:400"><input type="checkbox" value="${o.id}" ${sel.includes(o.id)?'checked':''}> ${esc(o.name)}</label>`).join(''):'<span style="color:var(--muted)">Belum ada produk</span>'}</div>`); }
    if(fl.type==='bool'){ return field(fl.l,`<select id="f_${fl.k}"><option value="true" ${v!==false?'selected':''}>Ya</option><option value="false" ${v===false?'selected':''}>Tidak</option></select>`); }
    if(fl.type==='fk'){ const lab=fl.fkLabel||'name'; return field(fl.l,`<select id="f_${fl.k}"><option value="">—</option>${(fkOpts[fl.k]||[]).map(o=>`<option value="${o.id}" ${v===o.id?'selected':''}>${esc(o[lab])}</option>`).join('')}</select>`); }
    if(fl.type==='select'){ return field(fl.l,`<select id="f_${fl.k}">${fl.opts.map(o=>`<option ${String(v||'')===o?'selected':''} value="${o}">${o||'—'}</option>`).join('')}</select>`); }
    if(fl.type==='date'){ return field(fl.l,`<input id="f_${fl.k}" type="date" value="${v?esc(v):''}">`); }
    if(fl.type==='cat'){ return field(fl.l,`<input id="f_${fl.k}" list="dl_${fl.k}" value="${v==null?'':esc(v)}" placeholder="ketik baru atau pilih"><datalist id="dl_${fl.k}">${catOpts.map(o=>`<option value="${esc(o)}"></option>`).join('')}</datalist>`); }
    if(fl.type==='num'){ return field(fl.l,`<input id="f_${fl.k}" type="text" inputmode="decimal" value="${v==null?'':esc(v)}"${fl.hint?` placeholder="${esc(fl.hint)}"`:''}>`); }
    return field(fl.l,`<input id="f_${fl.k}" type="text" value="${v==null?'':esc(v)}">`);
  });
  openModal(`<h2 style="margin-bottom:14px">${id?'Edit':'Tambah'} ${cfg.title}</h2>
    <div class="grid2">${f.join('')}</div>
    <div id="m-msg" class="msg"></div>
    <div class="modal-foot"><button class="btn ghost" onclick="closeModal()">Batal</button>
    <button class="btn" onclick='saveRow(CFG.${keyOf(cfg)},${id?JSON.stringify(id):'null'})'>Simpan</button></div>`);
}
function field(l,inner){ return `<div class="field"><label>${l}</label>${inner}</div>`; }
async function saveRow(cfg,id){
  const rec={};
  for(const fl of cfg.fields){
    if(fl.type==='multiprod'){ const box=document.getElementById('f_'+fl.k); rec[fl.k]=box?[...box.querySelectorAll('input:checked')].map(x=>x.value):[]; continue; }
    let v=document.getElementById('f_'+fl.k).value;
    if(fl.type==='num') v=v===''?null:Number(v);
    else if(fl.type==='bool') v=(v==='true');
    else v=v===''?null:v;
    if(fl.req && (v==null||v==='')){ msg('m-msg','"'+fl.l+'" wajib diisi.','err'); return; }
    rec[fl.k]=v;
  }
  msg('m-msg','Menyimpan...','');
  const q = id ? sb.from(cfg.table).update(rec).eq('id',id) : sb.from(cfg.table).insert(rec);
  const {error}=await q;
  if(error){ msg('m-msg','Gagal: '+error.message,'err'); return; }
  closeModal(); crud(cfg);
}
async function delRow(table,id,name){
  const key=Object.keys(CFG).find(k=>CFG[k].table===table); const cfg=key?CFG[key]:null;
  if(!confirm('Hapus "'+name+'"? Tindakan ini tidak bisa dibatalkan.')) return;
  const {error}=await sb.from(table).delete().eq('id',id);
  if(error){
    const fk = error.code==='23503' || /foreign key|violates|referenced|constraint/i.test(error.message||'');
    if(fk && cfg && cfg.archive){
      if(confirm('"'+name+'" tidak bisa dihapus permanen karena sudah punya riwayat (penjualan/resep/paket). Arsipkan saja? Produk akan disembunyikan dari kasir, tapi semua riwayat & laporan tetap aman.')){
        const {error:e2}=await sb.from(table).update({active:false}).eq('id',id);
        if(e2){ alert('Gagal mengarsipkan: '+e2.message); return; }
        if(cfg) crud(cfg);
      }
      return;
    }
    alert('Gagal menghapus: '+error.message); return;
  }
  if(cfg) crud(cfg);
}
async function restoreRow(table,id){
  const {error}=await sb.from(table).update({active:true}).eq('id',id);
  if(error){ alert('Gagal memulihkan: '+error.message); return; }
  const key=Object.keys(CFG).find(k=>CFG[k].table===table);
  if(key) crud(CFG[key]);
}

  for(const nm of names){ const v=r.__n[nkey(nm)]; if(v!==undefined && String(v).trim()!=='') return v; }
  return undefined;
}

      <input type="file" id="imp-file" accept=".xlsx,.xls" onchange="readImport(event)">
      <div id="imp-preview" style="margin-top:16px"></div>
    </div>`;

function readImport(ev){
  const file=ev.target.files[0]; if(!file)return;
  const rd=new FileReader();
  rd.onload=async e=>{
    const wb=XLSX.read(e.target.result,{type:'array'}); IMP={};
    const prev=document.getElementById('imp-preview'); prev.innerHTML='<div class="empty">Memeriksa data...</div>';
    let html='';
    const sheetByNorm={}; wb.SheetNames.forEach(sn=>sheetByNorm[nkey(sn)]=sn);
    for(const sheet of Object.keys(IMPMAP)){
      const actual=sheetByNorm[nkey(sheet)]; if(!actual)continue;
      const rows=XLSX.utils.sheet_to_json(wb.Sheets[actual],{defval:''}).filter(r=>Object.values(r).join('').trim()!=='');
      const recs=rows.map(IMPMAP[sheet].map).filter(x=>x.name&&String(x.name).trim()!=='');
      if(rows.length && !recs.length){
        const heads=Object.keys(rows[0]||{});
        html+=`<div style="margin-bottom:10px;padding:10px 12px;border:1px solid var(--danger);border-radius:8px;background:#fdecec">
          <b>${sheet}</b>: ${rows.length} baris terbaca, tapi kolom <b>Nama</b> tidak ditemukan — jadi tidak ada yang bisa diimpor.
          <div style="font-size:12px;margin-top:4px">Kolom yang terbaca di baris pertama: <b>${heads.length?heads.map(esc).join(', '):'(kosong)'}</b>.<br>Pastikan <u>baris pertama</u> berisi judul kolom (mis. <b>Nama Produk</b>, <b>Harga</b>), bukan baris kosong atau judul besar.</div></div>`;
        continue;
      }
      const table=IMPMAP[sheet].table; IMP[sheet]={table,recs};
      const codes=recs.map(r=>r.code).filter(Boolean); const exMap={};
      if(codes.length){ const {data}=await sb.from(table).select('code,name').in('code',codes); (data||[]).forEach(x=>exMap[x.code]=x.name); }
      let nw=0,upd=0,noCode=0; const coll=[];
      recs.forEach(r=>{
        if(!r.code){ noCode++; nw++; return; }
        if(exMap[r.code]===undefined){ nw++; }
        else if(String(exMap[r.code]).trim().toLowerCase()===String(r.name).trim().toLowerCase()){ upd++; }
        else { coll.push({code:r.code,old:exMap[r.code],neu:r.name}); }
      });
      html+=`<div style="margin-bottom:10px;padding:10px 12px;border:1px solid var(--line);border-radius:8px">
        <b>${sheet}</b> — ${recs.length} baris: <span style="color:var(--teal)">${nw} baru</span>${upd?` · ${upd} diperbarui (stok ditimpa)`:''}${coll.length?` · <span style="color:var(--danger)">${coll.length} kode bentrok</span>`:''}
        ${noCode?`<div style="font-size:12px;color:#9a5b1e;margin-top:4px">${noCode} baris tanpa Kode → dianggap item baru (bisa menduplikat bila diimpor ulang). Sebaiknya isi Kode.</div>`:''}
        ${coll.length?`<div style="font-size:12px;color:var(--danger);margin-top:6px"><b>⚠ Kode bentrok — item dengan nama berbeda akan DIGANTI (data lama hilang):</b><br>${coll.map(c=>`• ${esc(c.code)}: "${esc(c.old)}" → "${esc(c.neu)}"`).join('<br>')}<br>Kalau ini item berbeda, ganti Kode-nya dulu di file.</div>`:''}
      </div>`;
    }
    if(!Object.keys(IMP).length){
      if(html){ prev.innerHTML=html; }
      else { prev.innerHTML=`<div class="empty">Tidak ada sheet yang cocok. Sheet di file: <b>${wb.SheetNames.map(esc).join(', ')||'(tidak ada)'}</b>.<br>Nama tab sheet harus salah satu: <b>Produk</b>, <b>Bahan Baku</b>, <b>Bumbu</b>, atau <b>Aset</b>.</div>`; }
      return;
    }
    html+=`<div id="imp-msg" class="msg"></div><button class="btn" onclick="runImport()">Impor sekarang</button>`;
    prev.innerHTML=html;
  };
  rd.readAsArrayBuffer(file);
}
async function runImport(){
  msg('imp-msg','Mengimpor...','');
  let ok=0; const failRows=[];
  for(const sheet of Object.keys(IMP)){
    const {table,recs}=IMP[sheet]; if(!recs.length)continue;
    for(const [batch,useCode] of [[recs.filter(r=>r.code),true],[recs.filter(r=>!r.code),false]]){
      if(!batch.length)continue;
      const res=useCode? await sb.from(table).upsert(batch,{onConflict:'code'}) : await sb.from(table).insert(batch);
      if(!res.error){ ok+=batch.length; continue; }
      for(const r of batch){
        const rr=useCode? await sb.from(table).upsert([r],{onConflict:'code'}) : await sb.from(table).insert([r]);
        if(rr.error) failRows.push({sheet,code:r.code||'-',name:r.name||'(tanpa nama)',msg:rr.error.message});
        else ok++;
      }
    }
  }
  const box=document.getElementById('imp-msg');
  if(failRows.length){
    const shown=failRows.slice(0,50).map(f=>`• [${esc(f.sheet)}] Kode ${esc(f.code)} — ${esc(f.name)}: ${esc(f.msg)}`).join('<br>');
    box.className='msg err';
    box.innerHTML=`Berhasil ${ok} baris. <b>${failRows.length} baris GAGAL:</b><br>${shown}${failRows.length>50?`<br>… dan ${failRows.length-50} lainnya`:''}`;
  } else {
    box.className='msg ok'; box.textContent=`Berhasil mengimpor/memperbarui ${ok} baris.`;
  }
}

function computeTotals(opts){
  opts=opts||{voucher:0,pointsRedeem:0};
  const o=POS.order, st=o.sales_type, pf=posPriceField(st);
  const online=isOnlineType(st);
  const ds=new Date().toISOString().slice(0,10), weekend=[0,6].includes(new Date().getDay());
  let subtotal=0,dPromo=0,dMember=0;
  const tierPct=(!online&&POS.member&&POS.member.tier)?Number(POS.member.tier.discount_pct||0):0;
  POS.items.forEach(i=>{
    const p=POS.products.find(x=>x.id===i.product_id)||{}; const line=prodPrice(p,st)*Number(i.qty); subtotal+=line;
    if(online||p.type==='Bundling')return;
    let best=0;
    PROMOS.forEach(pr=>{
      if((pr.start_date&&pr.start_date>ds)||(pr.end_date&&pr.end_date<ds))return;
      if(pr.day_scope==='weekend'&&!weekend)return; if(pr.day_scope==='weekday'&&weekend)return;
      if(pr.scope==='product'){ const ids=(Array.isArray(pr.product_ids)&&pr.product_ids.length)?pr.product_ids:(pr.product_id?[pr.product_id]:[]); if(!ids.includes(p.id))return; }
      const d=pr.calc==='percent'?line*Number(pr.value)/100:Math.min(Number(pr.value),line);
      if(d>best)best=d;
    });
    if(best>0)dPromo+=best; else if(tierPct>0)dMember+=line*tierPct/100;
  });
  const S=SETTINGS, sv=S.service||{}, pb=S.pb1||{}, cr=S.cash_rounding||{}, pts=S.points||{};
  const voucher=online?0:Math.min(Number(opts.voucher||0),subtotal);
  const redeemVal=pts.redeem_value||100;
  const canRedeem=(pts.enabled!==false)&&POS.member&&Number(POS.member.points||0)>=Number(pts.min_redeem||0);
  const pointsRedeem=(online||!canRedeem)?0:Math.min(Number(opts.pointsRedeem||0),POS.member?Number(POS.member.points||0):0);
  const points_value=pointsRedeem*redeemVal;
  const base=Math.max(0,subtotal-dPromo-dMember-voucher-points_value);
  const service=(!online&&sv.enabled)?Math.round(base*Number(sv.pct||0)/100):0;
  const pb1=(!online&&pb.enabled)?Math.round((base+service)*Number(pb.pct||0)/100):0;
  let delivery_fee=0;
  if(st==='delivery'){
    const dvs=S.delivery||{};
    if(opts.delivFee!=null&&opts.delivFee!==''){ delivery_fee=Math.max(0,Number(opts.delivFee)||0); }
    else { delivery_fee=Number(dvs.fee||0); if(Number(dvs.free_above||0)>0 && base>=Number(dvs.free_above)) delivery_fee=0; }
  }
  let pre=base+service+pb1+delivery_fee, rounding=0, total=pre;
  if(!online&&cr.enabled){ const inc=Number(cr.increment||100); total=Math.round(pre/inc)*inc; rounding=total-pre; }
  const points_earned=(!online&&POS.member&&pts.enabled)?Math.floor(total/(pts.earn_per_rp||1000))*(pts.earn_points||1):0;
  return {subtotal:Math.round(subtotal),discount_promo:Math.round(dPromo),discount_member:Math.round(dMember),
    voucher:Math.round(voucher),points_value:Math.round(points_value),pointsRedeem,points_earned,
    service,pb1,delivery_fee:Math.round(delivery_fee),rounding,total:Math.round(total),sales_type:st};
}

/* ==================== PRINTER (Bluetooth thermal 58mm) ==================== */
const TPW=32; // karakter per baris untuk kertas 58mm
function btReady(){ return !!(window.ThermalPrinter); }
function getPrinter(){ try{ return JSON.parse(localStorage.getItem('printer71')||'null'); }catch(e){ return null; } }
function setPrinter(p){ try{ localStorage.setItem('printer71',JSON.stringify(p)); }catch(e){} }
const tEsc=s=>String(s==null?'':s).replace(/[<>\[\]]/g,'');
const tDiv=()=>'[L]'+'-'.repeat(TPW)+'\n';
const tLR=(l,r)=>'[L]'+l+'[R]'+r+'\n';
const tC=s=>'[C]'+s+'\n';
const tL=s=>'[L]'+s+'\n';
const tOutlet=()=>{ const o=SETTINGS.outlet||{}; let s='[C]<b>'+tEsc(o.name||'71 Kitchen')+'</b>\n'; if(o.address)s+=tC(tEsc(o.address)); if(o.phone)s+=tC(tEsc(o.phone)); return s; };
const tItems=its=>its.map(i=>tL(tEsc(i.name))+'[L]  '+i.qty+' x '+rp(i.unit_price)+'[R]'+rp(i.subtotal)+'\n').join('');
function btPrint(text,id,cb){
  let n=0;
  const attempt=()=>{ n++;
    window.ThermalPrinter.printFormattedText(
      {type:'bluetooth',id:id,text:text,printerWidthMM:58,printerNbrCharactersPerLine:TPW,mmFeedPaper:4},
      function(){ if(cb)cb(true); },
      function(err){ if(n<3){ setTimeout(attempt,900); } else { if(cb)cb(false,err); } }
    );
  };
  attempt();
}
function printThermal(text,cb){
  if(!btReady()){ alert('Fitur printer hanya jalan di aplikasi (APK), bukan di browser.'); return; }
  const pr=getPrinter();
  if(!pr){ alert('Printer belum dipilih. Buka menu Printer untuk memilih printer dulu.'); return; }
  btPrint(text,pr.id,function(ok,err){ if(ok){ if(cb)cb(); } else { alert('Gagal cetak: '+((err&&err.error)||err||'')+'. Pastikan printer menyala & sudah ter-pair, lalu coba lagi.'); } });
}
function emitPrint(html,text){
  if(btReady()&&getPrinter()){ printThermal(text); return; }
  if(!btReady()){
    const m=webPrintMode();
    if(m==='webbt'&&hasWebBT()){ wbtPrint(text).catch(e=>{ if(e&&e.name==='NotFoundError')return; alert('Gagal cetak Bluetooth: '+((e&&e.message)||e)+'\n\nBuka menu Printer > Hubungkan Printer, lalu coba lagi. Atau ganti mode cetak.'); }); return; }
    if(m==='rawbt'){ rawbtPrint(text); return; }
  }
  printHTML(html);
}
/* ---- Web Bluetooth (BLE): cetak langsung dari web, tanpa aplikasi tambahan ---- */
let WBT={dev:null,ch:null};
const WBT_SERVICES=[0x18f0,0xff00,0xffe0,0xfee7,0xff10,'49535343-fe7d-4ae5-8fa9-9fafd205e455','0000ff00-0000-1000-8000-00805f9b34fb','e7810a71-73ae-499d-8c15-faa9aef0c3f2'];
const hasWebBT=()=>!!(navigator.bluetooth);
function escposBytes(plain){ const b=[0x1b,0x40]; for(let i=0;i<plain.length;i++){ const c=plain.charCodeAt(i); b.push(c>255?63:c); } b.push(0x0a,0x0a,0x0a,0x0a); return new Uint8Array(b); }
async function wbtConnect(){
  const dev=await navigator.bluetooth.requestDevice({acceptAllDevices:true,optionalServices:WBT_SERVICES});
  const server=await dev.gatt.connect();
  const svcs=await server.getPrimaryServices();
  let ch=null;
  for(const s of svcs){ let cs=[]; try{ cs=await s.getCharacteristics(); }catch(e){ continue; }
    for(const c of cs){ if(c.properties.write||c.properties.writeWithoutResponse){ ch=c; break; } } if(ch)break; }
  if(!ch) throw new Error('Printer tersambung tapi tidak ada saluran tulis yang cocok.');
  dev.addEventListener('gattserverdisconnected',()=>{ WBT.ch=null; });
  WBT.dev=dev; WBT.ch=ch; return dev.name||'Printer';
}
async function wbtWrite(data){ const S=180; for(let i=0;i<data.length;i+=S){ const c=data.slice(i,i+S);
  if(WBT.ch.properties.writeWithoutResponse) await WBT.ch.writeValueWithoutResponse(c); else await WBT.ch.writeValue(c);
  await new Promise(r=>setTimeout(r,20)); } }
async function wbtPrint(text){
  if(!WBT.ch||!WBT.dev||!WBT.dev.gatt||!WBT.dev.gatt.connected){ await wbtConnect(); }
  await wbtWrite(escposBytes(tPlain(text)));
}
async function prConnectWBT(){
  try{ msg('pr-msg','Memilih printer... (pilih dari daftar yang muncul)',''); const n=await wbtConnect(); msg('pr-msg','Tersambung: '+n,'ok'); }
  catch(e){ if(e&&e.name==='NotFoundError'){ msg('pr-msg','',''); return; } msg('pr-msg','Gagal menyambung: '+((e&&e.message)||e),'err'); }

// Ubah markup thermal ([L]/[C]/[R], <b>) jadi teks polos rata 32 kolom untuk RawBT
function tPlain(text){
  const strip=s=>String(s).replace(/<[^>]+>/g,'');
  return text.split('\n').map(ln=>{
    if(!ln)return '';
    const lr=ln.match(/^\[L\](.*)\[R\](.*)$/);
    if(lr){ const l=strip(lr[1]),r=strip(lr[2]); const pad=Math.max(1,TPW-l.length-r.length); return l+' '.repeat(pad)+r; }
    if(ln.startsWith('[C]')){ const s=strip(ln.slice(3)); return ' '.repeat(Math.max(0,Math.floor((TPW-s.length)/2)))+s; }
    if(ln.startsWith('[R]')){ const s=strip(ln.slice(3)); return ' '.repeat(Math.max(0,TPW-s.length))+s; }
    if(ln.startsWith('[L]'))return strip(ln.slice(3));
    return strip(ln);
  }).join('\n');
}
function rawbtPrint(text){
  const plain=tPlain(text)+'\n\n\n';
  location.href='intent:'+encodeURIComponent(plain)+'#Intent;scheme=rawbt;package=ru.a402d.rawbtprinter;end;';
}

  if(t.voucher)s+=tLR('Voucher','-'+rp(t.voucher));

  if(t.service)s+=tLR('Service',rp(t.service));
  if(t.pb1)s+=tLR('PB1',rp(t.pb1));
  if(t.delivery_fee)s+=tLR('Ongkir',rp(t.delivery_fee));
  if(t.rounding)s+=tLR('Pembulatan',(t.rounding<0?'-':'')+rp(Math.abs(t.rounding)));

function opName(t,id){const arr=t==='raw'?S3.raw:t==='seasoning'?S3.sea:S3.prod;const x=arr.find(a=>a.id===id);return x?x.name:'(item)';}
function opCurStock(t,id){const arr=t==='raw'?S3.raw:t==='seasoning'?S3.sea:S3.prod;const x=arr.find(a=>a.id===id);return x?Number(x.stock):0;}
function opNew(){ openModal('<div id="op-body"></div>'); renderOpModal('raw'); }
function renderOpModal(type){
  const arr=type==='raw'?S3.raw:type==='seasoning'?S3.sea:S3.prod;
  document.getElementById('op-body').innerHTML=`<h2 style="margin-bottom:12px">Opname / Barang Rusak</h2>
   <div class="grid2">${field('Jenis item',`<select id="op_type" onchange="renderOpModal(this.value)"><option value="raw" ${type==='raw'?'selected':''}>Bahan Baku</option><option value="seasoning" ${type==='seasoning'?'selected':''}>Bumbu</option><option value="product" ${type==='product'?'selected':''}>Produk (Jadi)</option></select>`)}
   ${field('Item',`<select id="op_item" onchange="opSetSystem()">${arr.map(x=>`<option value="${x.id}">${esc(x.name)}</option>`).join('')}</select>`)}

   <div class="modal-foot"><button class="btn ghost" onclick="closeModal()">Batal</button><button class="btn" onclick="opSave()">Simpan (minta otorisasi)</button></div>`;

function opSetSystem(){const t=document.getElementById('op_type').value,id=document.getElementById('op_item').value;document.getElementById('op_sys').value=opCurStock(t,id);}
async function opSave(){

async function opApprove(id){ if(!confirm('Setujui? Stok disesuaikan ke angka fisik.'))return; const {error}=await sb.rpc('approve_opname',{p_id:id}); if(error){alert('Gagal: '+error.message);return;} await s3load(['raw','sea','prod']); viewOpname(); }

async function loadKitchen(){

  board.innerHTML='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px">'+
   data.map(t=>{const o=t.order||{};const tbl=o.table_no?('Meja '+o.table_no):(o.customer_name||'-');
    return `<div class="panel" style="padding:12px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <span class="pill">DAPUR ${esc((t.kitchen||'').toUpperCase())}</span><b>${esc(t.ticket_no||'')}</b></div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:8px">${esc(tbl)} · ${posTypeLabel(o.sales_type)} · ${new Date(t.created_at).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'})}</div>
      ${(t.items||[]).map(i=>`<label style="display:flex;gap:8px;align-items:flex-start;font-size:15px;padding:3px 0;cursor:pointer;${i.done?'opacity:.55':''}">
        <input type="checkbox" ${i.done?'checked':''} onchange="kitToggle('${i.id}',this.checked)" style="width:19px;height:19px;margin-top:2px;flex:0 0 auto">
        <span style="${i.done?'text-decoration:line-through':''}"><b>${i.qty}×</b> ${esc(i.name)}${i.note?`<div style="font-size:11px;color:var(--muted)">› ${esc(i.note)}</div>`:''}</span></label>`).join('')}
      ${(()=>{const tot=(t.items||[]).length,dn=(t.items||[]).filter(x=>x.done).length;return `<div style="font-size:11px;color:${dn===tot&&tot?'var(--ok)':'var(--muted)'};margin-top:4px">${dn}/${tot} selesai</div>`;})()}
      <button class="btn ${((t.items||[]).length&&(t.items||[]).every(x=>x.done))?'':'sec'}" style="width:100%;margin-top:8px" onclick="kitDone('${t.id}')">Selesai — angkat tiket</button></div>`;
   }).join('')+'</div>';
}
async function kitDone(id){ const {error}=await sb.from('kitchen_tickets').update({status:'done'}).eq('id',id); if(error){alert(error.message);return;} loadKitchen(); }
async function kitToggle(itemId,val){
  const {error}=await sb.from('kitchen_ticket_items').update({done:val}).eq('id',itemId);
  if(error){ alert('Gagal: '+error.message); }
  loadKitchen();
}

     <button class="btn" onclick="runReport()">Tampilkan</button></div></div><div id="rp-out"><div class="empty">Memuat...</div></div>`;
  runReport();

let RPTP=[];
function rptProdFilter(q){
  const el=document.getElementById('rpt-prod'); if(!el)return;
  q=(q||'').trim().toLowerCase();
  const rows=RPTP.filter(p=>p.n.toLowerCase().includes(q));
  el.innerHTML=rows.length?rows.map(p=>`<div class="lrow"><div class="lmain"><div class="lname">${esc(p.n)}</div><div class="lmeta">${fmtn(p.q)} terjual</div></div><div class="lright"><div class="lprice">${rp(p.o)}</div></div></div>`).join(''):'<div class="empty">Tidak ada penjualan produk yang cocok.</div>';
}
async function runReport(){
  const from=document.getElementById('rp_from').value, to=document.getElementById('rp_to').value;
  const out=document.getElementById('rp-out'); out.innerHTML='<div class="empty">Memuat...</div>';
  const A=from, B=to+'T23:59:59';
  const inv=(await sb.from('invoices').select('*').eq('status','paid').gte('created_at',A).lte('created_at',B)).data||[];
  const invIds=inv.map(x=>x.id);
  let ii=[]; if(invIds.length) ii=(await sb.from('invoice_items').select('qty,subtotal,name, product:products(name,category)').in('invoice_id',invIds)).data||[];
  const rawMv=(await sb.from('stock_movements').select('qty_change,unit_cost').eq('reason','sale').eq('item_type','raw').gte('created_at',A).lte('created_at',B)).data||[];
  const pur=(await sb.from('purchases').select('id,total,for_catering,supplier:suppliers(name)').eq('status','approved').gte('occurred_at',from).lte('occurred_at',to)).data||[];
  const purIds=pur.map(x=>x.id);
  let seaPI=[]; if(purIds.length) seaPI=(await sb.from('purchase_items').select('subtotal').eq('item_type','seasoning').in('purchase_id',purIds)).data||[];
  const exp=(await sb.from('expenses').select('category,amount,for_catering').eq('status','approved').gte('occurred_at',from).lte('occurred_at',to)).data||[];
  const oi=(await sb.from('other_incomes').select('category,amount,paid,pay_type').eq('status','approved').gte('occurred_at',from).lte('occurred_at',to)).data||[];
  const bk=(await sb.from('bookings').select('total,status').in('status',['settled','done']).gte('event_date',from).lte('event_date',to)).data||[];
  const sh=(await sb.from('shifts').select('*').gte('opened_at',A).lte('opened_at',B)).data||[];

  const chan={}; inv.forEach(x=>{chan[x.sales_type]=(chan[x.sales_type]||0)+Number(x.total);});
  const bkRev=bk.reduce((s,b)=>s+Number(b.total),0); if(bkRev) chan['booking']=(chan['booking']||0)+bkRev;
  const revenue=Object.values(chan).reduce((s,v)=>s+v,0);
  const hppRaw=rawMv.reduce((s,m)=>s+(-Number(m.qty_change))*Number(m.unit_cost||0),0);
  const hppSea=seaPI.reduce((s,p)=>s+Number(p.subtotal||0),0);
  const grossProfit=revenue-(hppRaw+hppSea);
  const expTotal=exp.reduce((s,e)=>s+Number(e.amount),0);
  const oiTotal=oi.reduce((s,e)=>s+Number(e.amount),0);
  const net=grossProfit+oiTotal-expTotal;
  const cat={}; ii.forEach(x=>{const k=(x.product&&x.product.category)||'lain2'; if(!cat[k])cat[k]={qty:0,omzet:0}; cat[k].qty+=Number(x.qty); cat[k].omzet+=Number(x.subtotal);});
  const ecat={}; exp.forEach(e=>{ecat[e.category]=(ecat[e.category]||0)+Number(e.amount);});
  const prodAgg={}; ii.forEach(x=>{const k=x.name||(x.product&&x.product.name)||'(produk)'; if(!prodAgg[k])prodAgg[k]={q:0,o:0}; prodAgg[k].q+=Number(x.qty); prodAgg[k].o+=Number(x.subtotal);});
  RPTP=Object.keys(prodAgg).sort((a,b)=>prodAgg[b].o-prodAgg[a].o).map(k=>({n:k,q:prodAgg[k].q,o:prodAgg[k].o}));

let shiftWaTextLast='';
async function shiftAgg(sid,openedAt,closedAt){
  const {data:inv}=await sb.from('invoices').select('id,total,sales_type,discount_promo,discount_member,voucher, order:orders!inner(shift_id)').eq('order.shift_id',sid).eq('status','paid');
  const I=inv||[]; const ids=I.map(x=>x.id);
  let pays=[]; if(ids.length) pays=(await sb.from('payments').select('method,amount').in('invoice_id',ids)).data||[];
  const byType={},byMethod={},online={};
  I.forEach(x=>{ byType[x.sales_type]=(byType[x.sales_type]||0)+1; if(isOnlineType(x.sales_type)) online[x.sales_type]=(online[x.sales_type]||0)+Number(x.total); });
  pays.forEach(p=>{ byMethod[p.method]=(byMethod[p.method]||0)+Number(p.amount); });
  const omzet=I.reduce((s,x)=>s+Number(x.total),0);
  const disc=I.reduce((s,x)=>s+Number(x.discount_promo||0)+Number(x.discount_member||0)+Number(x.voucher||0),0);
  let voids=0; try{ let q=sb.from('activity_log').select('id',{count:'exact',head:true}).eq('action','void_item').gte('created_at',openedAt); if(closedAt)q=q.lte('created_at',closedAt); const r=await q; voids=r.count||0; }catch(e){}
  return {count:I.length,omzet,byType,byMethod,online,disc,voids};
}
function shiftWaText(sh,a){
  const o=SETTINGS.outlet||{}; const d=t=>t?new Date(t).toLocaleString('id-ID',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'-';
  let t=`*LAPORAN TUTUP SHIFT*\n${o.name||'71 Kitchen'}\n================\nKasir : ${sh.cashier?sh.cashier.username:ME.username}\nBuka  : ${d(sh.opened_at)}\nTutup : ${d(sh.closed_at)}\n\n*KAS LACI*\nModal awal      ${rp(sh.opening_float)}\nPenjualan tunai ${rp(a.byMethod['tunai']||0)}\nPerkiraan kas   ${rp(sh.expected)}\nUang fisik      ${rp(sh.closing_count)}\nSelisih         ${Number(sh.variance)<0?'-':''}${rp(Math.abs(sh.variance))}\n\n*PENJUALAN*\nTransaksi: ${a.count} nota\nOmzet: ${rp(a.omzet)}`;
  const M={tunai:'Tunai',qris:'QRIS',transfer:'Transfer',edc:'EDC'};
  Object.keys(a.byMethod).forEach(k=>{ t+=`\n- ${M[k]||k}  ${rp(a.byMethod[k])}`; });
  t+='\n\n*JENIS TRANSAKSI*';
  Object.keys(a.byType).forEach(k=>{ t+=`\n- ${posTypeLabel(k)}: ${a.byType[k]}x`; });
  if(Object.keys(a.online).length){ t+='\n\n*ONLINE (piutang platform)*'; Object.keys(a.online).forEach(k=>{ t+=`\n- ${posTypeLabel(k)}  ${rp(a.online[k])}`; }); }
  t+=`\n\n*LAINNYA*\nDiskon & voucher: ${rp(a.disc)}\nItem void: ${a.voids}\n\nDitutup oleh ${ME.username}`;
  return t;
}
async function waShift(i){
  const sh=SHIFTHIST[i]; if(!sh)return;
  const a=await shiftAgg(sh.id,sh.opened_at,sh.closed_at);
  window.open('https://wa.me/?text='+encodeURIComponent(shiftWaText(sh,a)),'_blank');

  msg('vd-msg','Memverifikasi...','');
  const ok=await verifyManager(user,pass);
  if(!ok){ msg('vd-msg','Otorisasi gagal (bukan manager/owner atau password salah).','err'); return; }
  closeModal(); doVoidItem(id,reason,user);
}
async function doVoidItem(id,reason,by){
  await sb.from('order_items').delete().eq('id',id);
  try{ await sb.from('activity_log').insert({action:'void_item',detail:{order_item:id,reason,by}}); }catch(e){}
  POS.items=POS.items.filter(x=>x.id!==id); renderPosOrder();
}
async function verifyManager(username,password){
  try{
    const tmp=window.supabase.createClient(DEFAULT_URL,DEFAULT_KEY,{auth:{persistSession:false,autoRefreshToken:false,storageKey:'verify_tmp'}});
    const {data,error}=await tmp.auth.signInWithPassword({email:username+'@71.id',password});
    if(error||!data.user){ return false; }
    const {data:au}=await tmp.from('app_users').select('role').eq('id',data.user.id).single();
    await tmp.auth.signOut();
    return !!(au && ['manager','owner'].includes(au.role));
  }catch(e){ return false; }
}
/* Settle piutang online */
function rcSettle(id,amt){
  openModal(`<h2 style="margin-bottom:12px">Terima Pembayaran Platform</h2>${field('Jumlah diterima (Rp)',`<input id="rs_amt" type="text" inputmode="numeric" value="${Math.round(amt)}">`)}${field('Masuk ke akun',`<select id="rs_acct">${S3.acct.map(a=>`<option value="${a.id}" ${a.kind==='rekening'?'selected':''}>${esc(a.name)}</option>`).join('')}</select>`)}
   <div id="rs-msg" class="msg"></div><div class="modal-foot"><button class="btn ghost" onclick="closeModal()">Batal</button><button class="btn" onclick="rcSettleSave('${id}')">Terima</button></div>`);
}
async function rcSettleSave(id){
  const a=Number(document.getElementById('rs_amt').value); if(!a){ msg('rs-msg','Isi jumlah.','err'); return; }
  const acct=document.getElementById('rs_acct').value;
  const {error}=await sb.rpc('cash_adjust',{p_account:acct,p_dir:'in',p_amount:a,p_reason:'Settlement platform online'});
  if(error){ msg('rs-msg','Gagal: '+error.message,'err'); return; }
  await sb.from('receivables').update({received:a,status:'paid'}).eq('id',id);
  closeModal(); viewCash();
}

/* ==================== KOMPOSISI PRODUK (resep & bundling) ==================== */
let COMPO={product:null,raw:[],sea:[],prod:[]};
async function openComposition(id){
  const {data:p}=await sb.from('products').select('id,name,type').eq('id',id).single();
  if(!p)return;
  if(p.type==='Jadi'){
    if(!confirm('Produk "'+p.name+'" bertipe "Jadi" — stok dikelola langsung (Edit / Pembelian), tanpa resep.\n\nUbah jadi tipe "Resep" supaya bisa mengisi bahan/resep?')) return;
    const {error}=await sb.from('products').update({type:'Resep'}).eq('id',id);
    if(error){ alert('Gagal mengubah tipe: '+error.message); return; }
    p.type='Resep';
  }
  const [r,s,pr]=await Promise.all([
    sb.from('raw_materials').select('id,name,unit_use').order('name'),
    sb.from('seasonings').select('id,name,unit').order('name'),
    sb.from('products').select('id,name,type').order('name')]);
  COMPO={product:p,raw:r.data||[],sea:s.data||[],prod:pr.data||[]};
  openModal('<div id="compo-body"></div>'); await renderCompo();
}
async function renderCompo(){
  const p=COMPO.product;
  if(p.type==='Bundling'){
    const {data:items}=await sb.from('bundle_items').select('*').eq('bundle_id',p.id);
    const rows=(items||[]).map(it=>{const c=COMPO.prod.find(x=>x.id===it.component_id)||{};
      return `<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--line)"><span>${esc(c.name||'(produk)')} × ${it.qty}</span><button class="btn danger sm" onclick="compoDelBundle('${it.id}')">Hapus</button></div>`;}).join('')||'<div class="empty">Belum ada isi paket.</div>';
    document.getElementById('compo-body').innerHTML=`<h2 style="margin-bottom:4px">Isi Paket — ${esc(p.name)}</h2><p style="margin-top:0;color:var(--muted);font-size:13px">Produk yang termasuk dalam bundling ini.</p>${rows}
      <div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap">
        <select id="cb_prod" style="flex:1">${COMPO.prod.filter(x=>x.id!==p.id&&x.type!=='Bundling').map(x=>`<option value="${x.id}">${esc(x.name)}</option>`).join('')}</select>
        <input id="cb_qty" type="text" inputmode="decimal" value="1" style="width:70px">
        <button class="btn" onclick="compoAddBundle()">Tambah</button></div>
      <div id="cp-msg" class="msg"></div><div class="modal-foot"><button class="btn" onclick="closeModal();crud(CFG.product)">Selesai</button></div>`;
  } else {
    const {data:items}=await sb.from('recipe_items').select('*').eq('product_id',p.id);
    const rows=(items||[]).map(it=>{const arr=it.item_type==='raw'?COMPO.raw:COMPO.sea; const x=arr.find(a=>a.id===it.item_id)||{};
      const unit=it.item_type==='raw'?(x.unit_use||''):(x.unit||'');
      return `<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--line)"><span>${esc(x.name||'(item)')} — ${it.qty} ${esc(unit)} <span class="pill" style="font-size:10px" title="${it.item_type==='raw'?'Bahan baku':'Bumbu'}">${it.item_type==='raw'?'BB':'BU'}</span></span><button class="btn danger sm" onclick="compoDelRecipe('${it.id}')">Hapus</button></div>`;}).join('')||'<div class="empty">Belum ada bahan.</div>';
    document.getElementById('compo-body').innerHTML=`<h2 style="margin-bottom:4px">Resep — ${esc(p.name)}</h2><p style="margin-top:0;color:var(--muted);font-size:13px">Bahan baku (dan bumbu bila perlu) per 1 porsi. Dipakai untuk potong stok & hitung HPP.</p>${rows}
      <div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap">
        <select id="cr_type" onchange="compoTypeChange()" style="width:88px"><option value="raw">Bahan</option><option value="seasoning">Bumbu</option></select>
        <select id="cr_item" style="flex:1">${COMPO.raw.map(x=>`<option value="${x.id}">${esc(x.name)}</option>`).join('')}</select>
        <input id="cr_qty" type="text" inputmode="decimal" placeholder="Qty" style="width:70px">
        <button class="btn" onclick="compoAddRecipe()">Tambah</button></div>
      <div id="cp-msg" class="msg"></div><div class="modal-foot"><button class="btn" onclick="closeModal();crud(CFG.product)">Selesai</button></div>`;
  }
}
function compoTypeChange(){
  const arr=document.getElementById('cr_type').value==='raw'?COMPO.raw:COMPO.sea;
  document.getElementById('cr_item').innerHTML=arr.map(x=>`<option value="${x.id}">${esc(x.name)}</option>`).join('');
}
async function compoAddRecipe(){
  const t=document.getElementById('cr_type').value, item=document.getElementById('cr_item').value, qty=qnum(document.getElementById('cr_qty').value);
  if(!item||!(qty>0)){ msg('cp-msg','Pilih item & isi qty.','err'); return; }
  const {error}=await sb.from('recipe_items').insert({product_id:COMPO.product.id,item_type:t,item_id:item,qty});
  if(error){ msg('cp-msg','Gagal: '+error.message,'err'); return; }
  document.getElementById('cr_qty').value=''; renderCompo();
}
async function compoDelRecipe(id){ await sb.from('recipe_items').delete().eq('id',id); renderCompo(); }
async function compoAddBundle(){
  const comp=document.getElementById('cb_prod').value, qty=qnum(document.getElementById('cb_qty').value);
  if(!comp||!(qty>0)){ msg('cp-msg','Pilih produk & qty.','err'); return; }
  const {error}=await sb.from('bundle_items').insert({bundle_id:COMPO.product.id,component_id:comp,qty});
  if(error){ msg('cp-msg','Gagal: '+error.message,'err'); return; }
  document.getElementById('cb_qty').value='1'; renderCompo();
}
async function compoDelBundle(id){ await sb.from('bundle_items').delete().eq('id',id); renderCompo(); }

try{ if(screen.orientation&&screen.orientation.lock){ screen.orientation.lock('portrait').catch(()=>{}); } }catch(e){}
/* Penjaga portrait untuk HP & tablet (JS, tidak bergantung media query) */
(function(){
  const ua=navigator.userAgent;
  const isTouchDev=/Android|iPhone|iPod|iPad|Mobile|Tablet/i.test(ua)
    || (/Macintosh/.test(ua)&&navigator.maxTouchPoints>1)          /* iPad mode desktop */
    || (/Linux/.test(ua)&&!/Windows/.test(ua)&&navigator.maxTouchPoints>0); /* tablet Android mode desktop */
  function isLand(){
    try{ if(screen.orientation&&screen.orientation.type) return screen.orientation.type.indexOf('landscape')===0; }catch(e){}
    if(typeof window.orientation==='number') return Math.abs(window.orientation)===90;
    return window.innerWidth>window.innerHeight;
  }
  function upd(){ const el=document.getElementById('rotate-lock'); if(!el)return; el.style.display=(isTouchDev&&isLand())?'flex':'none'; }
  window.addEventListener('resize',upd);
  window.addEventListener('orientationchange',upd);
  try{ if(screen.orientation&&screen.orientation.addEventListener) screen.orientation.addEventListener('change',upd); }catch(e){}
  upd();
})();
if(window.supabase){ boot(); }
else {
